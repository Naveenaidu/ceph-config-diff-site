<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ceph Config Diff Viewer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <p class="eyebrow">Ceph Config Diff</p>
        <h1>Compare branch configuration changes</h1>
        <p class="hero-copy">
          Select a reference version and a comparing version to inspect the static
          config diff output generated by <code>config_diff.py diff-branch</code>.
        </p>
      </header>

      <section class="controls card">
        <div class="field-group">
          <label for="referenceVersion">Reference version</label>
          <select id="referenceVersion"></select>
        </div>
        <div class="field-group">
          <label for="comparingVersion">Comparing version</label>
          <select id="comparingVersion"></select>
        </div>
        <button id="loadDiffButton" type="button">Load diff</button>
      </section>

      <section class="summary-grid" aria-label="Diff summary">
        <article class="summary-card">
          <span class="summary-label">Added</span>
          <strong id="addedCount">0</strong>
        </article>
        <article class="summary-card">
          <span class="summary-label">Deleted</span>
          <strong id="deletedCount">0</strong>
        </article>
        <article class="summary-card">
          <span class="summary-label">Modified</span>
          <strong id="modifiedCount">0</strong>
        </article>
      </section>

      <p id="statusMessage" class="status-message" aria-live="polite"></p>

      <section class="results-grid">
        <section class="result-column card">
          <div class="section-heading added-heading">
            <h2>Added</h2>
            <span id="addedGroupCount" class="pill">0 groups</span>
          </div>
          <div id="addedSection" class="section-body"></div>
        </section>

        <section class="result-column card">
          <div class="section-heading deleted-heading">
            <h2>Deleted</h2>
            <span id="deletedGroupCount" class="pill">0 groups</span>
          </div>
          <div id="deletedSection" class="section-body"></div>
        </section>

        <section class="result-column card modified-column">
          <div class="section-heading modified-heading">
            <h2>Modified</h2>
            <span id="modifiedGroupCount" class="pill">0 groups</span>
          </div>
          <div id="modifiedSection" class="section-body"></div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
